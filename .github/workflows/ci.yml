name: CI smoke

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  work-typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: work
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: work/package-lock.json
      # Корневой и work/.npmrc: node-options=--use-system-ca для корпоративного TLS локально;
      # на ubuntu-latest это иногда роняет npm. В CI registry уже доверенный.
      - name: Strip local-only node-options from .npmrc
        working-directory: ${{ github.workspace }}
        run: |
          for f in .npmrc work/.npmrc; do
            if [ -f "$f" ]; then
              grep -Ev '^[[:space:]]*node-options[[:space:]]*=' "$f" > "${f}.ci" || true
              mv "${f}.ci" "$f"
            fi
          done
      - name: Install
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.invalid
          VITE_SUPABASE_ANON_KEY: ci-placeholder
