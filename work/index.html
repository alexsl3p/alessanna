<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <!-- viewport is set by the inline script below before React mounts -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport-meta" />
    <script>
      // Apply desktop viewport before React renders — dynamic changes after load are ignored by browsers
      try {
        if (localStorage.getItem("reception_desktop_mode") === "1") {
          document.getElementById("viewport-meta").content = "width=1280";
        }
      } catch(e) {}
    </script>
    <meta name="robots" content="noindex, nofollow" />
    <title>AlesSanna · CRM</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AlesSanna" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body class="bg-black text-zinc-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").then(function (reg) {
            // When a new service worker is installed and one was already
            // controlling the page, a fresh build is live — reload once so the
            // user never gets pinned to a stale version.
            reg.addEventListener("updatefound", function () {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener("statechange", function () {
                if (nw.state === "installed" && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              });
            });
          }).catch(function () {});
        });
      }
    </script>
  </body>
</html>
